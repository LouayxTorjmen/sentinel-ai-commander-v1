# =============================================================================
#  SENTINEL-AI COMMANDER — Suricata IDS/IPS Stack
#  Services: Suricata network traffic analyzer
#  Independent — uses host networking for packet capture
# =============================================================================

name: sentinel-suricata

volumes:
  suricata-logs:
    name: sentinel_suricata_logs

services:

  # ── Suricata IDS — Network traffic analysis ─────────────────────────────
  suricata:
    build:
      context: ./docker/suricata
      dockerfile: Dockerfile
    container_name: sentinel-suricata
    hostname: sentinel-suricata
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      - SURICATA_INTERFACE=${SURICATA_INTERFACE:-}
    volumes:
      - suricata-logs:/var/log/suricata
      - ./suricata/rules/custom:/custom-rules:ro

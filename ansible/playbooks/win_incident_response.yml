---
- name: SENTINEL-AI — Generic Incident Response (Windows)
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  become: false

  roles:
    - role: win_collect_evidence
      vars:
        evidence_incident_id: "{{ incident_id }}"
        evidence_target_ip: "{{ source_ip }}"

    - role: win_block_ip
      vars:
        block_ip_address: "{{ source_ip }}"
        block_ip_comment: "SENTINEL-AI: Generic incident — {{ incident_id }}"
        block_duration_seconds: 1800
      when:
        - source_ip != ""
        - block_attacker | default(true) | bool

    - role: win_notify_soc
      vars:
        notify_subject: "Incident Response Executed (Windows)"
        notify_severity: "{{ severity }}"
        notify_incident_id: "{{ incident_id }}"
        notify_message: |
          Generic Windows incident response executed for incident {{ incident_id }}.
          Source IP: {{ source_ip }}
          Evidence collected; review dashboard for full details.

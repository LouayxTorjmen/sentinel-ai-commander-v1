---
# =============================================================================
#  SENTINEL-AI — Response Playbook: harden_nginx_tls
#
#  TRIGGER:
#    Wazuh rules 100201 (TLS 1.0) or 100202 (TLS 1.1) fire when Suricata
#    on pfSense logs a weak TLS handshake to 10.50.0.12:443.
#
#  WHAT THIS PLAYBOOK DOES:
#    1. Restores /etc/ssl/openssl.cnf from the backup taken by setup playbook
#       (removes MinProtocol=None + SECLEVEL=0, restoring system TLS floor)
#    2. Replaces the weak vhost with a hardened configuration:
#         - ssl_protocols TLSv1.2 TLSv1.3 only
#         - ECDHE+AESGCM cipher suite (PFS, AEAD only)
#         - HSTS header (max-age=31536000)
#    3. Hard-restarts nginx so it re-initialises OpenSSL with restored cnf
#    4. Probes to confirm TLS 1.0/1.1 are now rejected
#    5. Emits structured remediation report for sentinel-ai-agents
#
#  MITRE ATT&CK:
#    Mitigates T1040 (Network Sniffing) — weak TLS allows passive decryption
#    Mitigates T1190 (Exploit Public-Facing Application) — weak cipher attack
#
#  IDEMPOTENT: safe to re-run; re-asserts hardened state.
# =============================================================================
- name: "SENTINEL-AI Response: Harden nginx TLS on srv-web"
  hosts: "{{ target_hosts | default('Ubuntu-agent-web') }}"
  gather_facts: yes
  become: true

  vars:
    cert_dir:       /etc/nginx/sentinel-tls
    cert_cn:        "srv-web.mydomain.com"
    web_root:       /var/www/sentinel-weak-tls
    vhost_path:     /etc/nginx/sites-available/sentinel-weak-tls.conf
    vhost_link:     /etc/nginx/sites-enabled/sentinel-weak-tls.conf
    system_ssl_cnf: /etc/ssl/openssl.cnf
    backup_ssl_cnf: /etc/ssl/openssl.cnf.sentinel-backup
    nginx_dropin:   /etc/systemd/system/nginx.service.d/sentinel-openssl.conf
    report_path:    /var/ossec/logs/sentinel_response_report.json

  tasks:

    # -------------------------------------------------------------------------
    # Step 1 — Restore system openssl.cnf from backup
    # The setup playbook (v5) patched /etc/ssl/openssl.cnf to add
    # MinProtocol=None + SECLEVEL=0 so nginx's OpenSSL init picks it up.
    # Restoring the backup removes that weakness at the OS level.
    # -------------------------------------------------------------------------
    - name: Check backup exists
      ansible.builtin.stat:
        path: "{{ backup_ssl_cnf }}"
      register: backup_stat

    - name: Restore system openssl.cnf from sentinel backup
      ansible.builtin.copy:
        src: "{{ backup_ssl_cnf }}"
        dest: "{{ system_ssl_cnf }}"
        remote_src: yes
        force: yes
      when: backup_stat.stat.exists
      notify: restart nginx

    - name: Warn if backup missing (manual review needed)
      ansible.builtin.debug:
        msg: "WARNING: {{ backup_ssl_cnf }} not found — openssl.cnf not restored. Review manually."
      when: not backup_stat.stat.exists

    # -------------------------------------------------------------------------
    # Step 2 — Remove OPENSSL_CONF systemd drop-in if present (v3/v4 remnant)
    # -------------------------------------------------------------------------
    - name: Remove systemd OPENSSL_CONF drop-in (v3/v4 remnant)
      ansible.builtin.file:
        path: "{{ nginx_dropin }}"
        state: absent

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    # -------------------------------------------------------------------------
    # Step 3 — Deploy hardened vhost
    # -------------------------------------------------------------------------
    - name: Deploy hardened TLS vhost
      ansible.builtin.copy:
        dest: "{{ vhost_path }}"
        mode: "0644"
        content: |
          # SENTINEL-AI hardened vhost — deployed by harden_nginx_tls response
          server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name {{ cert_cn }};

              ssl_certificate     {{ cert_dir }}/server.crt;
              ssl_certificate_key {{ cert_dir }}/server.key;

              # --- HARDENED ---
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
              ssl_prefer_server_ciphers off;
              ssl_session_timeout 1d;
              ssl_session_cache   shared:MozSSL:10m;
              ssl_session_tickets off;

              add_header Strict-Transport-Security "max-age=31536000" always;
              add_header X-Frame-Options           DENY always;
              add_header X-Content-Type-Options    nosniff always;
              # ----------------

              root  {{ web_root }};
              index index.html;
          }

          server {
              listen 80;
              server_name {{ cert_cn }};
              return 301 https://$host$request_uri;
          }
      notify: restart nginx

    # -------------------------------------------------------------------------
    # Step 4 — Flush handlers then validate
    # -------------------------------------------------------------------------
    - name: Flush handlers (restart nginx with restored openssl.cnf)
      ansible.builtin.meta: flush_handlers

    - name: Validate nginx config
      ansible.builtin.command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Abort if nginx config invalid
      ansible.builtin.fail:
        msg: "nginx -t failed after hardening: {{ nginx_test.stderr }}"
      when: nginx_test.rc != 0

    - name: Ensure nginx is running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes

    # -------------------------------------------------------------------------
    # Step 5 — Verify TLS 1.0/1.1 rejected, TLS 1.2 accepted
    # -------------------------------------------------------------------------
    - name: Probe TLS 1.0 — must be REJECTED
      ansible.builtin.shell: >
        openssl s_client -connect 127.0.0.1:443
        -tls1 -no_tls1_1 -no_tls1_2 -no_tls1_3
        </dev/null 2>&1 | grep -E 'Protocol|error|alert|CONNECTED'
      register: tls10_probe
      changed_when: false
      ignore_errors: yes

    - name: Probe TLS 1.1 — must be REJECTED
      ansible.builtin.shell: >
        openssl s_client -connect 127.0.0.1:443
        -tls1_1 -no_tls1 -no_tls1_2 -no_tls1_3
        </dev/null 2>&1 | grep -E 'Protocol|error|alert|CONNECTED'
      register: tls11_probe
      changed_when: false
      ignore_errors: yes

    - name: Probe TLS 1.2 — must be ACCEPTED
      ansible.builtin.shell: >
        openssl s_client -connect 127.0.0.1:443 -tls1_2
        </dev/null 2>&1 | grep -E 'Protocol|Cipher|CONNECTED'
      register: tls12_probe
      changed_when: false
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Step 6 — Write structured remediation report
    # -------------------------------------------------------------------------
    - name: Collect listening state
      ansible.builtin.command: ss -tlnp
      register: listen_state
      changed_when: false

    - name: Write remediation report
      ansible.builtin.copy:
        dest: "{{ report_path }}"
        mode: "0644"
        content: |
          {
            "sentinel_response": "harden_nginx_tls",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "target": "{{ inventory_hostname }}",
            "target_ip": "10.50.0.12",
            "status": "hardened",
            "changes": {
              "ssl_protocols": "TLSv1.2 TLSv1.3",
              "ssl_ciphers": "ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM (PFS only)",
              "openssl_cnf": "restored from backup (MinProtocol=None removed)",
              "hsts": "max-age=31536000",
              "tls10_rejected": {{ 'CONNECTED' not in (tls10_probe.stdout | default('')) }},
              "tls11_rejected": {{ 'CONNECTED' not in (tls11_probe.stdout | default('')) }},
              "tls12_accepted": {{ 'CONNECTED' in (tls12_probe.stdout | default('')) }}
            },
            "mitre": ["T1040", "T1190"],
            "triggered_by_rules": ["100201", "100202"]
          }

    - name: Remediation report
      ansible.builtin.debug:
        msg:
          - "=== SENTINEL-AI harden_nginx_tls COMPLETE ==="
          - "TLS 1.0 (must be rejected): {{ tls10_probe.stdout | default('rejected — no output') }}"
          - "TLS 1.1 (must be rejected): {{ tls11_probe.stdout | default('rejected — no output') }}"
          - "TLS 1.2 (must be accepted): {{ tls12_probe.stdout | default('NO OUTPUT — check nginx') }}"
          - "Listening 443: {{ '443' in listen_state.stdout }}"
          - "Report: {{ report_path }}"

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

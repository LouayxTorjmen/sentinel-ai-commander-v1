---
- name: Linux Lateral Movement Response
  hosts: "{{ target_hosts | default('all') }}"
  become: yes
  vars:
    source_ip: "{{ source_ip | default('') }}"
    incident_id: "{{ incident_id | default('unknown') }}"
    severity: "{{ severity | default('high') }}"

  roles:
    - collect_evidence
    - block_ip
    - notify_soc

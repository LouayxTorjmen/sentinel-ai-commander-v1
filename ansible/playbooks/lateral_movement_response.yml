---
- name: Linux Lateral Movement Response
  hosts: "{{ target_hosts | default('all') }}"
  become: yes
  vars:
    source_ip: "{{ source_ip | default('') }}"
    incident_id: "{{ incident_id | default('unknown') }}"
    severity: "{{ severity | default('high') }}"

  roles:
    - collect_evidence
    - role: block_ip
      vars:
        block_ip_address: "{{ source_ip }}"
        block_ip_comment: "SENTINEL-AI: Lateral movement response — incident {{ incident_id }}"
        block_duration_seconds: 3600
    - notify_soc

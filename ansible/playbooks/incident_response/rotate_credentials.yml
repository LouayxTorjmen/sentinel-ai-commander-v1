---
# =============================================================================
#  rotate_credentials.yml — Force Password Rotation on Compromised Accounts
#  Location: ansible/playbooks/incident_response/rotate_credentials.yml
#
#  TRIGGERED BY: WazuhSuricataAgent when rule T1078 (Valid Accounts) is detected
#
#  PURPOSE:
#    1. Expire passwords for specified accounts (forces reset on next login).
#    2. Revoke SSH authorized_keys if configured.
#    3. Log the rotation event for audit.
#
#  REQUIRED VARIABLES:
#    compromised_users    (list) — list of usernames to rotate
#    revoke_ssh_keys      (bool) — whether to remove authorized_keys (default: false)
#    incident_id          (str)  — for audit trail
# =============================================================================

- name: "Rotate Credentials — Incident Response"
  hosts: wazuh_agents
  become: true
  gather_facts: false

  vars:
    compromised_users: "{{ compromised_users | mandatory }}"
    revoke_ssh_keys: "{{ revoke_ssh_keys | default(false) | bool }}"
    incident_id: "{{ incident_id | default('CRED-ROT') }}"

  tasks:

    - name: "Expire passwords for compromised accounts"
      command: "passwd --expire {{ item }}"
      loop: "{{ compromised_users }}"
      loop_control:
        label: "{{ item }}"
      register: expire_result
      failed_when: false   # User may not exist on all hosts

    - name: "Revoke SSH authorized_keys"
      file:
        path: "/home/{{ item }}/.ssh/authorized_keys"
        state: absent
      loop: "{{ compromised_users }}"
      when: revoke_ssh_keys

    - name: "Log rotation event"
      command: >
        logger -t secops-ansible
        "INCIDENT={{ incident_id }} ACTION=rotate_credentials
        USERS={{ compromised_users | join(',') }} SSH_REVOKED={{ revoke_ssh_keys }}"

    - name: "Report completion"
      debug:
        msg: >
          Credentials rotated for: {{ compromised_users | join(', ') }}
          on {{ inventory_hostname }} (incident={{ incident_id }})

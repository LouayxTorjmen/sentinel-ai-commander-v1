---
- name: SENTINEL-AI — FIM Restore Response
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes

  pre_tasks:
    - name: Require file_path
      ansible.builtin.fail:
        msg: "file_path is required"
      when: file_path == ""

  roles:
    - role: collect_evidence
      vars:
        evidence_incident_id: "{{ incident_id }}"

    - role: restore_file_baseline
      vars:
        restore_file_path: "{{ file_path }}"

    - role: notify_soc
      vars:
        notify_subject: "FIM file restored: {{ file_path }}"
        notify_severity: "{{ severity }}"
        notify_incident_id: "{{ incident_id }}"

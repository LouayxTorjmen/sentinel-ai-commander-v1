---
# =============================================================================
#  SENTINEL-AI — Response Playbook: mysql_credential_response
#
#  TRIGGER:
#    Wazuh rule 100611 fires when MySQL general log records a query
#    targeting the infra_credentials table on srv-sql.
#
#  ATTACK CONTEXT:
#    An attacker who pivoted through srv-web queries dvwa.infra_credentials
#    which contains SSH/AD passwords for all lab systems. Stealing this
#    table enables lateral movement to every VM in the environment.
#
#  WHAT THIS PLAYBOOK DOES:
#    1. Collects evidence (active connections, processlist, recent queries)
#    2. Kills all active MySQL connections from non-localhost sources
#    3. Revokes remote SELECT privilege from dvwa user
#    4. Blocks source IP at iptables level (if srcip available)
#    5. Rotates the infra_credentials table (marks as compromised)
#    6. Writes remediation report
#
#  MITRE ATT&CK:
#    Mitigates T1555 (Credentials from Password Stores)
#    Mitigates T1078 (Valid Accounts — stolen credentials)
# =============================================================================
- name: "SENTINEL-AI Response: MySQL Credential Theft Containment"
  hosts: "{{ target_hosts }}"  # target_hosts MUST be passed — no default (enterprise-portable)
  gather_facts: yes
  become: true

  vars:
    mysql_user: root
    mysql_password: "{{ lookup('env', 'MYSQL_SCENARIO_PASSWORD') | default('louay') }}"
    evidence_dir: /var/log/sentinel-ai/mysql-credential-theft
    report_path: /var/ossec/logs/sentinel_mysql_response.json
    src_ip: "{{ source_ip | default('') }}"

  tasks:

    # -------------------------------------------------------------------------
    # Step 1 — Collect evidence before taking action
    # -------------------------------------------------------------------------
    - name: Create evidence directory
      ansible.builtin.file:
        path: "{{ evidence_dir }}"
        state: directory
        mode: "0750"

    - name: Capture active MySQL connections
      ansible.builtin.shell: >
        mysql -u {{ mysql_user }} -p{{ mysql_password }}
        -e "SELECT ID,USER,HOST,DB,COMMAND,TIME,STATE,INFO
            FROM information_schema.PROCESSLIST
            WHERE DB IS NOT NULL
            ORDER BY TIME DESC;"
        2>/dev/null | grep -v Warning
      register: active_connections
      changed_when: false
      ignore_errors: yes

    - name: Capture recent infra_credentials accesses from general log
      ansible.builtin.shell: >
        grep "infra_credentials" /var/log/mysql/general.log 2>/dev/null | tail -20
      register: recent_queries
      changed_when: false
      ignore_errors: yes

    - name: Save evidence
      ansible.builtin.copy:
        dest: "{{ evidence_dir }}/evidence_{{ ansible_date_time.epoch }}.txt"
        mode: "0640"
        content: |
          SENTINEL-AI MySQL Credential Theft Evidence
          Timestamp: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          Trigger: SELECT on dvwa.infra_credentials
          Source IP: {{ src_ip | default('unknown') }}

          === Active MySQL Connections ===
          {{ active_connections.stdout | default('no data') }}

          === Recent infra_credentials Queries ===
          {{ recent_queries.stdout | default('no data') }}

    # -------------------------------------------------------------------------
    # Step 2 — Kill active remote MySQL connections
    # -------------------------------------------------------------------------
    - name: Kill all non-localhost MySQL connections
      ansible.builtin.shell: |
        mysql -u {{ mysql_user }} -p{{ mysql_password }} 2>/dev/null \
          -e "SELECT ID FROM information_schema.PROCESSLIST
              WHERE HOST NOT LIKE 'localhost%'
              AND HOST NOT LIKE '127.0.0.1%'
              AND COMMAND != 'Sleep';" | \
        grep -E '^[0-9]+' | while read id; do
          mysql -u {{ mysql_user }} -p{{ mysql_password }} \
            -e "KILL $id;" 2>/dev/null
          echo "Killed connection: $id"
        done
      register: killed_connections
      changed_when: "'Killed' in killed_connections.stdout"
      ignore_errors: yes

    - name: Kill connections from specific source IP (if known)
      ansible.builtin.shell: |
        mysql -u {{ mysql_user }} -p{{ mysql_password }} 2>/dev/null \
          -e "SELECT ID FROM information_schema.PROCESSLIST
              WHERE HOST LIKE '{{ src_ip }}%';" | \
        grep -E '^[0-9]+' | while read id; do
          mysql -u {{ mysql_user }} -p{{ mysql_password }} \
            -e "KILL $id;" 2>/dev/null
          echo "Killed connection from {{ src_ip }}: $id"
        done
      when: src_ip != ''
      register: killed_src_connections
      changed_when: "'Killed' in (killed_src_connections.stdout | default(''))"
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Step 3 — Revoke remote access from dvwa user
    # -------------------------------------------------------------------------
    - name: Revoke remote SELECT from dvwa user
      ansible.builtin.shell: >
        mysql -u {{ mysql_user }} -p{{ mysql_password }}
        -e "REVOKE SELECT ON dvwa.infra_credentials FROM 'dvwa'@'%';
            FLUSH PRIVILEGES;"
        2>/dev/null | grep -v Warning
      register: revoke_result
      changed_when: true
      ignore_errors: yes

    - name: Verify dvwa privileges after revocation
      ansible.builtin.shell: >
        mysql -u {{ mysql_user }} -p{{ mysql_password }}
        -e "SHOW GRANTS FOR 'dvwa'@'%';"
        2>/dev/null | grep -v Warning
      register: dvwa_grants
      changed_when: false
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Step 4 — Block source IP at iptables (if known)
    # -------------------------------------------------------------------------
    - name: Block source IP at iptables
      ansible.builtin.shell: >
        iptables -I INPUT -s {{ src_ip }} -p tcp --dport 3306 -j DROP &&
        echo "Blocked {{ src_ip }}:3306"
      when: src_ip != ''
      register: iptables_result
      changed_when: "'Blocked' in iptables_result.stdout"
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Step 5 — Mark infra_credentials as compromised
    # -------------------------------------------------------------------------
    - name: Add compromised flag to infra_credentials
      ansible.builtin.shell: >
        mysql -u {{ mysql_user }} -p{{ mysql_password }}
        -e "ALTER TABLE dvwa.infra_credentials
            ADD COLUMN IF NOT EXISTS sentinel_compromised TIMESTAMP NULL;
            UPDATE dvwa.infra_credentials
            SET sentinel_compromised = NOW()
            WHERE sentinel_compromised IS NULL;"
        2>/dev/null | grep -v Warning
      register: mark_result
      changed_when: true
      ignore_errors: yes

    # -------------------------------------------------------------------------
    # Step 6 — Write remediation report
    # -------------------------------------------------------------------------
    - name: Write remediation report
      ansible.builtin.copy:
        dest: "{{ report_path }}"
        mode: "0644"
        content: |
          {
            "sentinel_response": "mysql_credential_response",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "target": "{{ inventory_hostname }}",
            "target_ip": "{{ ansible_host | default(inventory_hostname) }}",
            "status": "contained",
            "source_ip": "{{ src_ip | default('unknown') }}",
            "actions": {
              "connections_killed": "{{ killed_connections.stdout | default('none') }}",
              "dvwa_revoked": {{ revoke_result.rc == 0 }},
              "source_blocked": {{ src_ip != '' and iptables_result.rc is defined and iptables_result.rc == 0 }},
              "credentials_marked_compromised": {{ mark_result.rc == 0 }}
            },
            "impact": "dvwa.infra_credentials contains passwords for all lab systems — credentials must be considered compromised and rotated",
            "mitre_mitigated": ["T1555", "T1078"],
            "triggered_by_rules": ["100611", "100612"],
            "evidence": "{{ evidence_dir }}"
          }

    - name: Remediation summary
      ansible.builtin.debug:
        msg:
          - "=== SENTINEL-AI mysql_credential_response COMPLETE ==="
          - "Connections killed: {{ killed_connections.stdout | default('none') }}"
          - "dvwa SELECT revoked: {{ revoke_result.rc == 0 }}"
          - "Source IP blocked: {{ src_ip | default('not available') }}"
          - "Credentials marked compromised: {{ mark_result.rc == 0 }}"
          - "Evidence: {{ evidence_dir }}"
          - "Report: {{ report_path }}"
          - "WARNING: Rotate all passwords in infra_credentials immediately"

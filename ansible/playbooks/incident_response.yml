---
- name: SENTINEL-AI — Generic Incident Response
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  roles:
    - role: collect_evidence
      vars:
        evidence_incident_id: "{{ incident_id }}"
        evidence_target_ip: "{{ source_ip }}"
    - role: notify_soc
      vars:
        notify_subject: "Incident Response Executed"
        notify_severity: "{{ severity }}"
        notify_incident_id: "{{ incident_id }}"
        notify_message: |
          Generic incident response executed for incident {{ incident_id }}.
          Source IP: {{ source_ip }}
          Evidence has been collected.
          Please review the incident dashboard for full details.

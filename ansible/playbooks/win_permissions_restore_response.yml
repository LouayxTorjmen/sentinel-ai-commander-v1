---
- name: SENTINEL-AI — Permissions Restore Response (Windows)
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  become: false

  roles:
    - role: win_collect_evidence
      vars:
        evidence_incident_id: "{{ incident_id }}"
        collect_network: false

    - role: win_enforce_permissions
      vars:
        enforce_custom_paths: "{{ custom_paths | default([]) }}"

    - role: win_notify_soc
      vars:
        notify_subject: "Windows permissions enforced"
        notify_severity: "{{ severity }}"
        notify_incident_id: "{{ incident_id }}"
        notify_message: "ACLs restored from baseline on {{ ansible_hostname }}"

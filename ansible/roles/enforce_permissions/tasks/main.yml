---
- name: Enforce baseline permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
  loop: "{{ permissions_baseline + enforce_custom_paths }}"
  when:
    - not dry_run | bool
  ignore_errors: true
  register: perm_results

- name: Log enforcement
  ansible.builtin.lineinfile:
    path: /var/log/sentinel-ai-responses.log
    line: "{{ ansible_date_time.iso8601 }} | ENFORCE_PERMISSIONS | count={{ (permissions_baseline + enforce_custom_paths) | length }} changed={{ perm_results.results | selectattr('changed', 'equalto', true) | list | length }}"
    create: yes

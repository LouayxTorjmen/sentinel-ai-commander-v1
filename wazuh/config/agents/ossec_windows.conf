<!--
  SENTINEL-AI Agent Config — Windows hosts (Win10 / Win11 / Server 2019+)
  Port 50041 = Docker NAT (do not change)
  NO enrollment block — keys managed via API (enroll.py writes client.keys directly)
-->
<ossec_config>

  <!-- ── Manager connection ─────────────────────────────────────────────── -->
  <client>
    <server>
      <address>172.31.70.13</address>
      <port>50041</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows10, windows11, windowsserver</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ── Buffer ────────────────────────────────────────────────────────── -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ── Rootcheck ─────────────────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
    <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ── Syscollector — IT Hygiene data ─────────────────────────────────── -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1m</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
    <users>yes</users>
    <groups>yes</groups>
    <services>yes</services>
    <browser_extensions>yes</browser_extensions>
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <!-- ── SCA ───────────────────────────────────────────────────────────── -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
  </sca>

  <!-- ── File Integrity Monitoring (realtime, like Linux) ──────────────── -->
  <!-- WARNING: realtime FIM on Windows uses ReadDirectoryChangesW which can  -->
  <!-- spike agent CPU on busy paths. We watch HIGH-VALUE paths only.        -->
  <!--                                                                       -->
  <!-- Categories monitored:                                                 -->
  <!--   1. Boot/system config        (rare changes, real signal)            -->
  <!--   2. Scheduled task definitions (persistence)                         -->
  <!--   3. Startup folders            (persistence)                         -->
  <!--   4. World-writable temp dirs   (anyone can drop tools)               -->
  <!--   5. High-priv binaries         (PowerShell, drivers)                 -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Boot / system config (rare changes, real attack signal) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\System32\drivers\etc</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\System32\config</directories>

    <!-- Scheduled tasks (a major persistence vector) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\System32\Tasks</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\Tasks</directories>

    <!-- Startup persistence locations -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>

    <!-- World-writable / accessible-to-everyone directories -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\Public</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\Temp</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Temp</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\PerfLogs</directories>

    <!-- High-priv binaries (changes here are very suspicious) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\System32\WindowsPowerShell\v1.0</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Windows\System32\drivers</directories>

    <!-- Per-user document/work directories (high-value: catches dropped malware,
         exfil staging, downloaded payloads). report_changes captures file diffs. -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\Desktop</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\Downloads</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\Documents</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\OneDrive</directories>

    <!-- Per-user media directories - watch for new/deleted files but NO report_changes
         (media files are large binaries, full diff is wasteful and noisy) -->
    <directories realtime="yes" check_all="yes">C:\Users\*\Pictures</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\Videos</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\Music</directories>

    <!-- Per-user AppData hot paths (LOLBAS abuse, droppers) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\Users\*\AppData\Local\Temp</directories>

    <!-- Windows registry monitoring — persistence and service hijack keys -->
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunServices</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunServicesOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Image File Execution Options</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Windows</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Active Setup\Installed Components</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Cryptography\OID</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Cryptography\Providers\Trust</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Policies\Microsoft\Windows\System\Scripts</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\batfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\cmdfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\comfile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\exefile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\piffile</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\AllFilesystemObjects</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\Directory</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\Folder</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Classes\Protocols</windows_registry>

    <!-- Ignore noisy paths -->
    <!-- File extension noise: logs, swap, lock, backup, prefetch -->
    <ignore type="sregex">\.log$|\.tmp$|\.lock$|\.bak$|\.swp$|\.swo$|\.prefetch$|\.etl$</ignore>
    <!-- Office lock/temp files (Word/Excel/PowerPoint create these constantly) -->
    <ignore type="sregex">~\$|\.~lock</ignore>
    <!-- Browser partial / in-progress downloads (Chrome, Firefox, Edge) -->
    <ignore type="sregex">\.crdownload$|\.partial$|\.part$|\.download$</ignore>
    <!-- Thumbnail caches generated by Explorer/Photos viewer -->
    <ignore type="sregex">[Tt]humbs\.db$|\.thumbnail$|\.cache$</ignore>
    <ignore>C:\Windows\Temp\Crashpad</ignore>
    <ignore>C:\Users\Administrator\AppData\Local\Temp\Sysmon</ignore>
    <!-- Per-user thumbnail/icon cache (Explorer regenerates these constantly) -->
    <ignore type="sregex">\\AppData\\Local\\Microsoft\\Windows\\Explorer\\</ignore>

    <skip_nfs>yes</skip_nfs>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>

    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>

  <!-- ── Log collection — Windows Event Channels (comprehensive) ───────── -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
  </localfile>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
  </localfile>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

  <!-- PowerShell operational log: catches encoded commands, Empire/Posh-C2 -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-PowerShell/Operational</location>
  </localfile>

  <!-- PowerShell verbose script-block logging (when enabled) -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Windows PowerShell</location>
  </localfile>

  <!-- Sysmon: process creation, network connections, file mods, registry mods -->
  <!-- Requires Sysmon installed with SwiftOnSecurity config. Logs silently   -->
  <!-- skipped if Sysmon not present.                                         -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Sysmon/Operational</location>
  </localfile>

  <!-- Windows Defender alerts -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
  </localfile>

  <!-- RDP / Terminal Services logon events -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
  </localfile>

  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
  </localfile>

  <!-- Scheduled task creation/modification (persistence indicator) -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-TaskScheduler/Operational</location>
  </localfile>

  <!-- Active response log (for tracking remediation actions) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>active-responses.log</location>
  </localfile>

  <!-- ── Active response ────────────────────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <logging>
    <log_format>plain</log_format>
  </logging>

  <!--
    Suricata NIDS <localfile> for eve.json is injected dynamically by
    Phase 2B (deploy_suricata_windows) — only hosts that actually run
    Suricata get the integration block, matching Linux behavior.
  -->

</ossec_config>

# =============================================================================
#  Suricata Threshold Configuration — Reduce alert noise
# =============================================================================

# Suppress noisy ET rules for internal DNS
suppress gen_id 1, sig_id 2013031, track by_src, ip 172.16.0.0/12
suppress gen_id 1, sig_id 2013031, track by_src, ip 10.0.0.0/8
suppress gen_id 1, sig_id 2013031, track by_src, ip 192.168.0.0/16

# Rate-limit SSH brute force alerts (max 1 per src per 60s)
rate_filter gen_id 1, sig_id 9000001, track by_src, count 1, seconds 60, new_action alert
